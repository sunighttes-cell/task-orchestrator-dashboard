spring:
  application:
    name: task-orchestrator

  #Later to add: DB credentials, profiles, logging config
  datasource:
    url: jdbc:h2:file:./data/taskdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

server:
  port: 8080